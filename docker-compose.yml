services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  apigateway:
    container_name: apigateway
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      customerservice:
        condition: service_started
      productservice:
        condition: service_started
      orderservice:
        condition: service_started
      shippingservice:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  customerservice:
    container_name: customerservice
    build:
      context: ./CustomerService/CustomerService.Api
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMqHost: rabbitmq
    volumes:
      - ./CustomerService/CustomerService.Api/Data:/app/Data
    depends_on:
      rabbitmq:
        condition: service_healthy

  productservice:
    container_name: productservice
    build:
      context: ./ProductService/ProductService.Api
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMqHost: rabbitmq
    volumes:
      - ./ProductService/ProductService.Api/Data:/app/Data
    depends_on:
      rabbitmq:
        condition: service_healthy

  orderservice:
    container_name: orderservice
    build:
      context: ./OrderService/OrderService.Api
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CustomerServiceUrl: http://customerservice:8080
      RabbitMqHost: rabbitmq
    volumes:
      - ./OrderService/OrderService.Api/Data:/app/Data
    depends_on:
      customerservice:
        condition: service_started
      productservice:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  shippingservice:
    container_name: shippingservice
    build:
      context: ./ShippingService/ShippingService.Api
      dockerfile: Dockerfile
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMqHost: rabbitmq
    volumes:
      - ./ShippingService/ShippingService.Api/Data:/app/Data
    depends_on:
      rabbitmq:
        condition: service_healthy
